<!-- Logo de la source "wttj" (Welcome to the Jungle). Assumé maison, simple et
     déterministe : monogramme "WTTJ" sur fond jaune signature de la marque.
     Pensé pour un rendu net à 24-32px (viewBox carré, coins arrondis). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" role="img" aria-label="Welcome to the Jungle">
  <rect width="64" height="64" rx="14" fill="#ffcd00"/>
  <text x="32" y="40" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="-1" text-anchor="middle" fill="#111111">WTTJ</text>
</svg>
